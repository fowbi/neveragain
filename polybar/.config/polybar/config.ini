; Polybar — Catppuccin Latte, matches alacritty theme.
; Launch via ~/.config/polybar/launch.sh (started from i3 exec_always).

[colors]
base      = #eff1f5
mantle    = #e6e9ef
crust     = #dce0e8
text      = #4c4f69
subtext1  = #5c5f77
subtext0  = #6c6f85
surface0  = #ccd0da
surface1  = #bcc0cc
surface2  = #acb0be
blue      = #1e66f5
lavender  = #7287fd
mauve     = #8839ef
red       = #d20f39
green     = #40a02b
yellow    = #df8e1d
peach     = #fe640b
teal      = #179299

[bar/main]
monitor     = ${env:MONITOR:}
width       = 100%
height      = 28pt
radius      = 0
background  = ${colors.base}
foreground  = ${colors.text}

line-size   = 2pt
border-size = 0

padding-left  = 1
padding-right = 1

module-margin = 1

separator        = |
separator-foreground = ${colors.surface1}

font-0 = IosevkaTerm:size=11;2
font-1 = IosevkaTerm:style=Bold:size=11;2

modules-left   = i3
modules-center = date
modules-right  = pulseaudio memory cpu battery powermenu

tray-position = right
tray-padding  = 4

cursor-click  = pointer
cursor-scroll = ns-resize

enable-ipc = true

wm-restack = i3
override-redirect = false

[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
strip-wsnumbers = false
index-sort = true
enable-click = true
enable-scroll = false

label-focused = %index%
label-focused-background = ${colors.blue}
label-focused-foreground = ${colors.base}
label-focused-padding = 1

label-unfocused = %index%
label-unfocused-foreground = ${colors.subtext0}
label-unfocused-padding = 1

label-visible = %index%
label-visible-foreground = ${colors.text}
label-visible-padding = 1

label-urgent = %index%
label-urgent-background = ${colors.red}
label-urgent-foreground = ${colors.base}
label-urgent-padding = 1

[module/date]
type = internal/date
interval = 1
date = %Y-%m-%d
time = %H:%M:%S
label = %date%  %time%
label-foreground = ${colors.text}

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "cpu "
format-prefix-foreground = ${colors.subtext0}
label = %percentage:2%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = "mem "
format-prefix-foreground = ${colors.subtext0}
label = %percentage_used:2%%

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "vol "
format-volume-prefix-foreground = ${colors.subtext0}
label-volume = %percentage%%
label-muted = muted
label-muted-foreground = ${colors.surface2}

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 98
low-at  = 15

format-charging   = <label-charging>
format-discharging = <label-discharging>
format-full       = <label-full>
format-low        = <label-low>

label-charging    = chg %percentage%%
label-discharging = bat %percentage%%
label-full        = full
label-low         = LOW %percentage%%
label-low-foreground = ${colors.red}

[module/powermenu]
type = custom/text
content = pwr
content-foreground = ${colors.subtext0}
click-left = ~/.config/polybar/powermenu.sh &

[settings]
screenchange-reload = true
pseudo-transparency = false
